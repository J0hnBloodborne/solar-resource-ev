name: Ingest (current, scheduled)

# Daily top-up: pull the most recent year for all configured points (the cache
# de-dups, so this only appends new hours) and publish as an artifact.
on:
  schedule:
    - cron: "0 6 * * *" # 06:00 UTC daily
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[ingest]"
      - name: Pull recent data
        run: solarpredict ingest --years 1
      - uses: actions/upload-artifact@v4
        with:
          name: parquet-cache-current
          path: data/cache/*.parquet
          if-no-files-found: error
